{% extends 'base.html' %}
{% block title %}Login — VOGUE STORE{% endblock %}
{% block extra_css %}
<style>
    .auth-section { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
    .auth-card { background: var(--white); border: 1px solid var(--border); padding: 50px 44px; width: 100%; max-width: 440px; }
    .auth-eyebrow { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; display: block; }
    .auth-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 400; margin-bottom: 32px; }
    .auth-title em { font-style: italic; color: var(--gold); }
    .form-label-vogue { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray); margin-bottom: 6px; display: block; }
    .form-control-vogue { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); background: var(--cream); font-size: 0.88rem; outline: none; transition: border-color 0.2s; border-radius: 2px; margin-bottom: 18px; font-family: 'Inter', sans-serif; }
    .form-control-vogue:focus { border-color: var(--black); background: var(--white); }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.82rem; color: var(--gray); }
    .auth-footer a { color: var(--black); font-weight: 600; text-decoration: none; border-bottom: 1px solid var(--black); }
</style>
{% endblock %}
{% block content %}
<div class="auth-section">
    <div class="auth-card">
        <span class="auth-eyebrow">Welcome Back</span>
        <h2 class="auth-title">Sign <em>In</em></h2>
        {% if messages %}{% for m in messages %}<div class="alert" style="background:#fff0f0;color:#c0392b;border:1px solid #f5c6cb;padding:10px 14px;margin-bottom:16px;font-size:0.85rem;">{{ m }}</div>{% endfor %}{% endif %}
        <form method="POST">
            {% csrf_token %}
            <label class="form-label-vogue">Username</label>
            <input type="text" class="form-control-vogue" name="username" placeholder="Your username" required>
            <label class="form-label-vogue">Password</label>
            <input type="password" class="form-control-vogue" name="password" placeholder="Your password" required>
            <button type="submit" class="btn-vogue w-100 text-center d-block" style="padding:14px;font-size:0.8rem;">Sign In</button>
        </form>
        <div class="auth-footer">
            New to VOGUE? <a href="{% url 'register' %}">Create Account</a>
        </div>
    </div>
</div>
{% endblock %}
